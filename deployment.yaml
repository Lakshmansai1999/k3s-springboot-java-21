apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker1
      containers:
      - name: hello
        image: lakshmansai/springboot-hello:v1
        ports:
        - containerPort: 8080
